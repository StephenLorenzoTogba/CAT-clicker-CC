<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAT Clicker</title>
    <link rel="stylesheet" href="CatClicker.css">
</head>

<body>
<section>
<div class="main">

    <!-- ===== LEFT SIDE ===== -->
    <div class="left">
        <h3>
            Cats: <br/>
            <span class="Cats-cost white-text">0</span>
        </h3>

        <h4>
            CPS: <span class="cps-display white-text">0</span>
        </h4>

        <img src="motion-cat-transparent.gif"
             class="Box-image"
             onclick="incrementCats(this)"
             draggable="false"
             alt="Click cat">
    </div>

    <!-- ===== RIGHT SIDE ===== -->
    <div class="right">

        <!-- WORKER CAT -->
        <div class="upgrades" onclick="buyWorkerCat()">
            <div class="left-section">
                <img src="Arbetande katt med gul hjälm.png" class="upgarde-img" alt="Worker cat">
            </div>

            <div class="mid-section">
                <h4>Worker Cat</h4>
                <div class="cost-info">
                    <p>Cost: <span class="clicker-cost">10</span></p>
                    <img src="motion-cat-transparent.gif" class="money-img">
                </div>
            </div>

            <div class="right-section">
                Level <span class="clicker-level">0</span>
            </div>

            <div class="next-level-info">
                <p>+<span class="clicker-increase">1</span> per click</p>
            </div>
        </div>

        <!-- PASSIVE CAT -->
        <div class="upgrades" onclick="buyPassiveCat()">
            <div class="left-section">
                <img src="Motioncat.png" class="upgarde-img" alt="Passive cat">
            </div>

            <div class="mid-section">
                <h4>Motion Cat</h4>
                <div class="cost-info">
                    <p>Cost: <span class="cat-cost">130</span></p>
                    <img src="motion-cat-transparent.gif" class="money-img">
                </div>
            </div>

            <div class="right-section">
                Level <span class="cat-level">0</span>
            </div>

            <div class="next-level-info">
                <p>+<span class="cat-increase">1</span> CPS</p>
            </div>
        </div>

        <!-- MOUSE HUNTER -->
        <div class="upgrades" onclick="buyMouseHunter()">
            <div class="left-section">
                <img src="Cat with mouse in mouth.png" class="upgarde-img" alt="Mouse hunter cat">
            </div>

            <div class="mid-section">
                <h4>Mouse Hunter</h4>
                <div class="cost-info">
                    <p>Cost: <span class="mouse-cost">25</span></p>
                    <img src="motion-cat-transparent.gif" class="money-img">
                </div>
            </div>

            <div class="right-section">
                Level <span class="mouse-level">0</span>
            </div>

            <div class="next-level-info">
                <p>+10% bonus chance</p>
            </div>
        </div>

        <!-- KING CAT -->
        <div class="upgrades" onclick="buyKingCat()">
            <div class="left-section">
                <img src="Regal tabby cat with golden crown.png" class="upgarde-img" alt="King cat">
            </div>

            <div class="mid-section">
                <h4>King Cat </h4>
                <div class="cost-info">
                    <p>Cost: <span class="king-cost">500</span></p>
                    <img src="motion-cat-transparent.gif" class="money-img">
                </div>
            </div>

            <div class="right-section">
                Level <span class="king-level">0</span>
            </div>

            <div class="next-level-info">
                <p>+10 CPS</p>
            </div>
        </div>

        <!-- GALAXY CAT -->
        <div class="upgrades" onclick="buyGalaxyCat()">
            <div class="left-section">
                <img src="Galactic tabby with glowing crown.png" class="upgarde-img" alt="Galaxy cat">
            </div>

            <div class="mid-section">
                <h4>Galaxy Cat </h4>
                <div class="cost-info">
                    <p>Cost: <span class="galaxy-cost">2000</span></p>
                    <img src="motion-cat-transparent.gif" class="money-img">
                </div>
            </div>

            <div class="right-section">
                Level <span class="galaxy-level">0</span>
            </div>

            <div class="next-level-info">
                <p>+50 CPS</p>
            </div>
        </div>

    </div>
</div>
</section>

<audio id="bg-music"></audio>

<script src="CatClicker.js"></script>
</body>
</html>
